name: CI

on:
  # PRs validate every feature branch (via pull_request). push is scoped to
  # main only (post-merge / direct-to-main coverage) so feature-branch pushes
  # are not billed twice (push + the PR's pull_request run). Cuts ~half the CI
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to keep CI lean.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Reborn stack: the AOS is Go (core + the `agix-core` CLI) + TypeScript-on-Bun (the
  # agent fleet) + Rust (the bus). CI gates the two toolchains that gate the fleet:
  # `core` (Go build + test) and `fleet` (Bun tests). (Go + TypeScript-on-Bun + Rust).
  core:
    name: Core (Go build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  fleet:
    name: Fleet (Bun tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: fleet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # The TypeScript fleet is dependency-free (no package.json, nothing to install):
      # the runtime uses only Bun built-ins and shells into the Go `agix-core` binary.
      - name: Test
        run: bun test tests/

  api-python:
    name: API Python (lint, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/api-python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api-python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint (ruff)
        run: ruff check app

      - name: Smoke import
        run: python -c "from app.main import app; print(app.title)"
