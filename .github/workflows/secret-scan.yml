name: secret-scan

# Backstop secret scanning (defense-in-depth on top of the local pre-commit
# hook in .githooks/). Strategy:
#   • pull_request — diff scan (TruffleHog reliably diffs PR base..head)
#   • schedule     — weekly full-history sweep
#   • workflow_dispatch — manual full scan
# Direct-to-main pushes are covered by the weekly sweep + the pre-commit hook.
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff/full scans have context

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.95.8
        with:
          # --results=verified: only live, confirmed secrets fail CI (low noise;
          # the pre-commit hook catches broader patterns locally pre-commit).
          # NOTE: the trufflehog action already appends `--fail` itself, so it must
          # NOT be repeated here -- duplicating it makes trufflehog abort with
          # "flag 'fail' cannot be repeated" (exit 1), which silently disabled
          # secret scanning on every PR. Pass only the result-filter here.
          extra_args: --results=verified
