name: dco

# Developer Certificate of Origin (DCO) enforcement.
#
# AI_POLICY.md and CONTRIBUTING.md require every commit to be signed off
# (`git commit -s` → a `Signed-off-by: Name <email>` trailer): the contributor
# certifies they have the right to submit the work under the project's license.
# Policy required it; nothing enforced it — this is the automated check.
#
# Strategy: on a pull request, verify EVERY commit in the PR range carries a
# well-formed Signed-off-by trailer. A missing sign-off fails the check with a
# contributor-facing fix ("git commit --amend -s" / "git rebase --signoff"),
# never a silent red X. Merge commits (2+ parents) are exempt — a maintainer's
# merge is not a contribution needing a DCO.
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco-check:
    name: DCO sign-off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the base..head range resolves

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # GRANDFATHER CUTOFF. The DCO is adopted going FORWARD: commits authored before
          # this instant predate the policy and are exempt. Rewriting the existing history
          # to add trailers would mean force-pushing shared branches that other sessions
          # actively commit to — a far worse risk than a
          # retroactively-unsigned commit. Every commit authored from the cutoff on must
          # be signed; `.githooks/prepare-commit-msg` adds the trailer automatically
          # (enable once: git config core.hooksPath .githooks).
          DCO_ENFORCE_FROM: "2026-07-11T00:00:00Z"
        run: |
          set -euo pipefail
          missing=0
          grandfathered=0
          cutoff_epoch=$(date -u -d "$DCO_ENFORCE_FROM" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$DCO_ENFORCE_FROM" +%s)
          # Each non-merge commit in the PR range must carry a Signed-off-by trailer.
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            if git show -s --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              continue
            fi
            authored_epoch="$(git show -s --format=%at "$sha")"
            if [ "$authored_epoch" -lt "$cutoff_epoch" ]; then
              grandfathered=$((grandfathered + 1))
              continue
            fi
            subject="$(git show -s --format=%s "$sha")"
            echo "::error::commit ${sha:0:8} (\"$subject\") is missing a Signed-off-by trailer"
            missing=$((missing + 1))
          done
          if [ "$grandfathered" -gt 0 ]; then
            echo "note: $grandfathered commit(s) predate the DCO cutoff ($DCO_ENFORCE_FROM) and are exempt."
          fi
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "$missing commit(s) are not signed off. The DCO (https://developercertificate.org)"
            echo "requires a sign-off on every commit. To fix:"
            echo "  • single commit:   git commit --amend -s && git push --force-with-lease"
            echo "  • whole branch:    git rebase --signoff origin/main && git push --force-with-lease"
            echo "Then set your identity once with: git config user.name / user.email"
            exit 1
          fi
          echo "All commits in the PR range are signed off (or predate the cutoff). ✓"
