name: Feature request
description: Propose a capability or improvement for Agix AOS
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. If it's open-ended, consider starting a
        [Discussion](https://github.com/agix-ai/agix-aos/discussions) first.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The need or friction behind the request. What can't you do today?
      placeholder: When I ..., I have to ... because Agix doesn't ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like Agix to do. A new agent? A CLI command? A runtime capability?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps — related agents, prior art, links.
    validations:
      required: false
